<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0A1C"/>
      <stop offset="100%" stop-color="#02020A"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tile background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Neon hairline border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25"
        fill="none" stroke="rgba(0,229,255,0.28)" stroke-width="1"/>

  <!-- F letter (paths, crisp at any size) -->
  <g fill="url(#fGrad)" filter="url(#glow)">
    <rect x="14" y="13" width="9" height="40" rx="1.5"/>
    <rect x="14" y="13" width="29" height="9"  rx="1.5"/>
    <rect x="14" y="28" width="23" height="9"  rx="1.5"/>
  </g>

  <!-- Magenta period accent -->
  <circle cx="48" cy="49" r="5" fill="#FF2A92"/>
  <circle cx="48" cy="49" r="5" fill="#FF2A92" opacity="0.35" filter="url(#glow)"/>
</svg>
